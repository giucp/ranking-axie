<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Axie Leaderboard API Pro</title>
<style>
  body { background: #0a0e1a; color: #c9d6df; font-family: monospace; padding: 20px; }
  .rank-card { background: #0d1b2a; border: 1px solid #1e3a5f; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 20px; border-radius: 8px; }
  .rank-num { color: #ffd700; font-size: 1.5rem; font-weight: bold; width: 50px; }
  button { padding: 12px 24px; background: #00ff9f; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; color: #000; }
</style>
</head>
<body>

  <h1>Ranking Real (API Gateway)</h1>
  <button onclick="fetchLeaderboard()">CARGAR RANKING</button>
  <div id="status" style="margin: 15px 0; color: #00d4ff;"></div>
  <div id="results"></div>

  <script>
    // --- PEGA TU LINK DE CLOUDFLARE AQUÍ (sin barra al final) ---
    const MI_PUENTE_PRIVADO = 'dawn-moon-94a0.loveandpainsports.workers.dev';

    async function fetchLeaderboard() {
      const status = document.getElementById('status');
      status.textContent = 'Conectando por el servidor VIP de Sky Mavis...';

      try {
        // Usamos el enlace directo REST para Leaderboards
        const response = await fetch(MI_PUENTE_PRIVADO + '/origins/v2/season-leaderboards?limit=10', {
          method: 'GET'
        });

        const rawText = await response.text();
        console.log("Respuesta VIP cruda:", rawText);

        const json = JSON.parse(rawText);

        if (!json._items) {
          status.style.color = '#ff4444';
          status.textContent = 'Error desde Sky Mavis: revisa la consola (F12).';
          return;
        }

        let html = '';
        json._items.forEach((p, index) => {
          html += `
            <div class="rank-card">
              <div class="rank-num">#${index + 1}</div>
              <div>
                <strong>${p.name || 'Sin nombre'}</strong><br>
                Rango: ${p.rank} | MMR: ${p.vstar}
              </div>
            </div>`;
        });

        document.getElementById('results').innerHTML = html;
        status.style.color = '#00ff9f';
        status.textContent = '¡Ranking cargado exitosamente sin bloqueos!';
      } catch (e) {
        status.style.color = '#ff4444';
        status.textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
